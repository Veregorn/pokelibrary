<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Mitad superior roja -->
  <path d="M 10 50 A 40 40 0 0 1 90 50 Z" fill="#EE1515"/>
  <!-- Mitad inferior blanca -->
  <path d="M 10 50 A 40 40 0 0 0 90 50 Z" fill="#FFFFFF"/>
  <!-- Borde exterior -->
  <circle cx="50" cy="50" r="40" fill="none" stroke="#222222" stroke-width="5"/>
  <!-- Línea horizontal central -->
  <line x1="10" y1="50" x2="37" y2="50" stroke="#222222" stroke-width="5"/>
  <line x1="63" y1="50" x2="90" y2="50" stroke="#222222" stroke-width="5"/>
  <!-- Círculo central blanco -->
  <circle cx="50" cy="50" r="13" fill="#FFFFFF" stroke="#222222" stroke-width="5"/>
  <!-- Círculo interior pequeño -->
  <circle cx="50" cy="50" r="6" fill="#FFFFFF" stroke="#222222" stroke-width="3"/>
</svg>
